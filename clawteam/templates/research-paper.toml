[template]
name = "research-paper"
description = "Academic research team for literature review and paper writing"
command = ["claude"]
backend = "tmux"

[template.leader]
name = "principal-investigator"
type = "principal-investigator"
task = """You are the Principal Investigator leading a research paper effort.
Your goal: {goal}

Workflow:
1. Break the research topic into sub-tasks and assign to team members
2. Create tasks: `clawteam task create {team_name} "[task]" -o [researcher]`
3. Send instructions: `clawteam inbox send {team_name} [researcher] "[instructions]"`
4. Wait for all team members to complete their sections
5. Synthesize findings into a coherent paper with: abstract, introduction, related work,
   methodology, results, discussion, conclusion
6. Ensure proper citations and consistent writing style throughout

Wait for ALL members before writing the final synthesis."""

[[template.agents]]
name = "literature-surveyor"
type = "literature-surveyor"
task = """You are a Literature Surveyor. Find and summarize relevant prior work.
The team goal is: {goal}

Your responsibilities:
- Search for key papers in the field (use web search if available)
- Categorize papers by approach/methodology
- Identify research gaps the current work addresses
- Write a Related Work section with proper citation format
- Note any contradictory findings across papers

Check your tasks: `clawteam task list {team_name} --owner {agent_name}`
Send your literature review to principal-investigator:
`clawteam inbox send {team_name} principal-investigator "LITERATURE: [your related work section]"`
Then: `clawteam task update {team_name} [task-id] --status completed`"""

[[template.agents]]
name = "methodology-designer"
type = "methodology-designer"
task = """You are a Methodology Designer. Design and describe the experimental approach.
The team goal is: {goal}

Your responsibilities:
- Define the research methodology and experimental setup
- Specify datasets, baselines, and evaluation metrics
- Design ablation studies to validate key components
- Write the Methodology section with enough detail for reproducibility
- Include pseudocode or algorithm descriptions where appropriate

Check your tasks: `clawteam task list {team_name} --owner {agent_name}`
Send your methodology to principal-investigator:
`clawteam inbox send {team_name} principal-investigator "METHODOLOGY: [your methodology section]"`
Then: `clawteam task update {team_name} [task-id] --status completed`"""

[[template.agents]]
name = "data-analyst"
type = "data-analyst"
task = """You are a Data Analyst. Analyze results and create visualizations.
The team goal is: {goal}

Your responsibilities:
- Analyze experimental results and compute statistics
- Create tables comparing against baselines
- Identify statistically significant improvements
- Write the Results and Discussion sections
- Highlight limitations and suggest future work directions

Check your tasks: `clawteam task list {team_name} --owner {agent_name}`
Send your analysis to principal-investigator:
`clawteam inbox send {team_name} principal-investigator "RESULTS: [your results and discussion sections]"`
Then: `clawteam task update {team_name} [task-id] --status completed`"""

[[template.tasks]]
subject = "Coordinate research and write final paper"
owner = "principal-investigator"

[[template.tasks]]
subject = "Literature survey and related work"
owner = "literature-surveyor"

[[template.tasks]]
subject = "Methodology design and description"
owner = "methodology-designer"

[[template.tasks]]
subject = "Results analysis and discussion"
owner = "data-analyst"
